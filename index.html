Create a complete modern clothing store website.

IMPORTANT RULES:
- The entire website must be written in ONE single HTML file.
- All CSS must be inside a <style> tag.
- All JavaScript must be inside a <script> tag.
- Do NOT split the code into multiple files.
- The final output must be only the full HTML code.

STORE INFORMATION:
Create a fictional clothing store called "Urban Thread".

DESIGN REQUIREMENTS:
- Modern and professional fashion store design
- Mobile responsive layout
- Clean typography
- Soft shadows and modern cards
- Smooth hover animations
- Fashion style colors (black, white, beige, light gray)

SECTIONS REQUIRED:

1. HERO SECTION
- Large banner
- Store name "Urban Thread"
- Short slogan: "Style that defines you"
- Call to action button "Shop Now"

2. FEATURED PRODUCTS
- Grid with at least 6 clothing items
- Each item must include:
  - Image (use online placeholder fashion images)
  - Product name
  - Price
  - "Add to Cart" button

3. ABOUT THE STORE
- Short paragraph explaining the brand
- Modern layout with image and text

4. COLLECTIONS
Create 3 categories:
- Men's Collection
- Women's Collection
- New Arrivals

5. CUSTOMER REVIEWS
Add 3 testimonial cards with names and comments.

6. CONTACT SECTION
Include:
- Address
- Email
- Phone number
- Button that opens WhatsApp

7. FOOTER
Include:
- Social media icons
- Copyright text
- Navigation links

IMAGE RULES:
Use online images from fashion-related sources like Unsplash or similar.

JAVASCRIPT FEATURES:
- Simple cart interaction (Add to cart alert)
- Smooth scrolling
- Basic hover effects
- Small animations on scroll

FINAL OUTPUT RULE:
Return ONLY the final HTML code with embedded CSS and JavaScript.

The code must be clean, well structured, and ready to publish directly on GitHub or Netlify.
